<!doctype html>
<html>
<script>
function play() {
	fetch("http://localhost:8080/play");
}
function pause() {
	fetch("http://localhost:8080/pause");
}
function quit() {
	fetch("http://localhost:8080/quit");
}
function updateTracking(update) {
	ship = document.getElementById("ship-" + update.id);
	if (ship == null) {
		ship = document.createElementNS("http://www.w3.org/2000/svg", "circle");
		ship.id = "ship-" + update.id;
		ship.setAttribute("r", "2")
		ship.setAttribute("fill", "blue")
		document.getElementById("tracking-svg").appendChild(ship);
	}
	ship = document.getElementById("ship-" + update.id);
	ship.setAttribute("cx", update.p.x)
	ship.setAttribute("cy", update.p.y)
}
async function track() {
	const trackingResponse = await fetch("http://localhost:8080/tracking");
	buffer = "";
	for await (const chunk of trackingResponse.body) {
		s = new TextDecoder().decode(chunk)
		lines = s.split(/\n/g);
		lines[0] = buffer + lines[0];
		buffer = lines[lines.length-1];
		for (var i=0; i < lines.length - 1; i++) {
			updateTracking(JSON.parse(lines[i]));
		}
	}
}
track();
</script>
<body>
<div id="tracking">
<button onclick="play()">play</button>
<button onclick="pause()">pause</button>
<button onclick="quit()">quit</button>
<svg id="tracking-svg" version="1.1" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="-20 -20 200 200">
</svg>
</div>
</body>
</html>
